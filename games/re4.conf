# Resident Evil 4 Remake (2023) - RE Engine
# Status: untested
# Note: RE4 has a native macOS port (Mac App Store, December 2023).
#       This fix is for users running the Windows/Steam version via CrossOver.
# PCGamingWiki confirms cutscenes use Windows Media Video.
# Directory name is best-effort based on Capcom's naming convention.
# If install fails, check the actual folder name in steamapps/common/.

GAME_ID="re4"
GAME_NAME="Resident Evil 4"
GAME_DIR_NAME="RESIDENT EVIL 4 BIOHAZARD RE4"
GAME_EXE="re4.exe"
STEAM_APP_ID="2050650"
GAME_PREFIX="re4"
PLIST_LABEL="com.re4fix.decode-server"
STATUS="untested"

BOTTLE_ENV_VARS=()
DISABLE_CRASH_REPORTER=false
